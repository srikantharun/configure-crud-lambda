policy:
  name: juiceshop_v1
  description: JuiceShop WAF Baseline 1.3 testing
  cloudwatch_log_group: aws-waf-logs-baseline13
labels:
  detection:
    xss: awswaf:managed:aws:core-rule-set:CrossSiteScripting_Body
    size_body: awswaf:managed:aws:core-rule-set:SizeRestrictions_Body
    size_querystring: awswaf:managed:aws:core-rule-set:SizeRestrictions_QUERYSTRING
    lfi: awswaf:managed:aws:core-rule-set:GeneralLFI_Body
    sqli: awswaf:managed:aws:core-rule-set:SQLi_Body
    sqli_cookie: awswaf:managed:aws:core-rule-set:SQLi_COOKIE
  supported_checks:
  - size
  - xss
  - sqli
  - cmdi
  - lfi
  - rfi
  - ssti
  - base64
requirements:
- id: juiceshop-0001
  tuning_type: xss
  description: XSS payload test 1
  uri: /rest/user/login
  method: POST
  host: dlpaasrngb6ue.cloudfront.net
